<mat-toolbar [color]="themeService.getTheme()">
  <mat-toolbar-row fxLayout="row">
    <span>View Article</span> &nbsp;
      [Published on {{ articleDetials.publication_date | date: 'dd-MM-yyyy'}}]
    <span class="spacer"></span>
    <button class="mat-dialog-close" mat-icon-button mat-dialog-close>
      <mat-icon>close</mat-icon>
    </button>
  </mat-toolbar-row>
</mat-toolbar>

<mat-dialog-content class="mat-typography">
  Title: {{articleDetials.title}}
  <hr>
  <div [innerHTML]="articleDetials.content | sanitizeHtml"></div>

</mat-dialog-content>
